<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="760" viewBox="0 0 1280 760">
  <rect width="1280" height="760" fill="#f6f8fa"/>
  <text x="70" y="78" font-family="Arial, sans-serif" font-size="40" font-weight="800" fill="#0b1f44">Everything feeds one checkout decision</text>
  <text x="70" y="116" font-family="Arial, sans-serif" font-size="20" fill="#57606a">Offers, benefits, points, cashback, and deal news are not separate chores anymore.</text>

  <rect x="438" y="278" width="404" height="168" rx="28" fill="#0b1f44"/>
  <text x="510" y="342" font-family="Arial, sans-serif" font-size="30" font-weight="800" fill="#ffffff">Decision Engine</text>
  <text x="494" y="382" font-family="Arial, sans-serif" font-size="18" fill="#c9d1d9">Search active offers + card benefits</text>
  <text x="528" y="414" font-family="Arial, sans-serif" font-size="18" fill="#c9d1d9">Return the best payment move</text>

  <g font-family="Arial, sans-serif">
    <rect x="70" y="178" width="292" height="132" rx="22" fill="#ddf4ff" stroke="#54aeef" stroke-width="2"/>
