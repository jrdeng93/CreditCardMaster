    <text x="102" y="262" font-size="17" fill="#57606a">Add user-provided offers</text>
    <text x="102" y="288" font-size="17" fill="#57606a">Search them until expiry</text>

    <rect x="70" y="358" width="292" height="132" rx="22" fill="#dafbe1" stroke="#2da44e" stroke-width="2"/>
    <text x="102" y="408" font-size="24" font-weight="800" fill="#0b1f44">Manual Offers</text>
    <text x="102" y="442" font-size="17" fill="#57606a">Email, app, account messages</text>
    <text x="102" y="468" font-size="17" fill="#57606a">Paste or add targeted deals</text>

    <rect x="70" y="538" width="292" height="132" rx="22" fill="#fff8c5" stroke="#d4a72c" stroke-width="2"/>
    <text x="102" y="588" font-size="24" font-weight="800" fill="#0b1f44">Credit Card News</text>
    <text x="102" y="622" font-size="17" fill="#57606a">Hot discussions each morning</text>
    <text x="102" y="648" font-size="17" fill="#57606a">Push digest to Discord</text>

    <rect x="918" y="178" width="292" height="132" rx="22" fill="#fbefff" stroke="#bf87ff" stroke-width="2"/>
    <text x="950" y="228" font-size="24" font-weight="800" fill="#0b1f44">Card Benefits</text>
    <text x="950" y="262" font-size="17" fill="#57606a">Credits and bonus categories</text>
    <text x="950" y="288" font-size="17" fill="#57606a">Merchant/category reasoning</text>

    <rect x="918" y="358" width="292" height="132" rx="22" fill="#ffebe9" stroke="#ff8182" stroke-width="2"/>
    <text x="950" y="408" font-size="24" font-weight="800" fill="#0b1f44">Wallet Strategy</text>
    <text x="950" y="442" font-size="17" fill="#57606a">Points vs cashback</text>
    <text x="950" y="468" font-size="17" fill="#57606a">Benefits-only card logic</text>

    <rect x="918" y="538" width="292" height="132" rx="22" fill="#eaeef2" stroke="#8c959f" stroke-width="2"/>
    <text x="950" y="588" font-size="24" font-weight="800" fill="#0b1f44">Local Privacy</text>
    <text x="950" y="622" font-size="17" fill="#57606a">SQLite on your machine</text>
    <text x="950" y="648" font-size="17" fill="#57606a">No password or MFA storage</text>
